<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กำลังเชื่อมต่อ...</title>
  <link rel="preload" href="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js" as="script">
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', sans-serif;
      background: #ffffff;
      color: #222222;
      padding: 20px;
    }
    .logo-img {
      width: 80%;
      max-width: 300px;
      margin-bottom: 24px;
      border-radius: 16px;
    }
    .line-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.07);
      border-radius: 50px;
      padding: 10px 20px;
      margin-bottom: 20px;
    }
    .line-icon {
      width: 32px;
      height: 32px;
      background: #06C755;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .line-icon svg { width: 24px; height: 24px; }
    .line-text { font-size: 16px; font-weight: 600; color: #222222; }
    .status-text { font-size: 14px; color: #555555; margin-bottom: 24px; }
    .dots { display: flex; gap: 8px; }
    .dot {
      width: 10px; height: 10px;
      background: #222222; border-radius: 50%;
      opacity: 0.3; animation: pulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <img class="logo-img"
       src="https://raw.githubusercontent.com/proservice3000ud/True-liff-bridge/main/Trueonline-logo.svg.png"
       alt="True Online">
  <div class="line-badge">
    <div class="line-icon">
      <svg viewBox="0 0 24 24" fill="white">
        <path d="M12 2C6.48 2 2 6.03 2 11c0 3.13 1.68 5.9 4.28 7.6L5.5 22l3.62-1.9C10.3 20.67 11.15 21 12 21c5.52 0 10-4.03 10-9S17.52 2 12 2z"/>
      </svg>
    </div>
    <span class="line-text">กำลังพาคุณไปยัง LINE @clubtrue</span>
  </div>
  <p class="status-text">กรุณารอสักครู่...</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <script>
    const LIFF_ID = "2009932145-FwlmUmzy";
    const WEBHOOK_URL = "https://n8nb.workproservice.org/webhook/true-liff";

    // localStorage helpers (cross-redirect persistence)
    function saveParams(data) {
      try {
        localStorage.setItem('true_liff_params', JSON.stringify({
          ...data,
          _ts: Date.now()
        }));
      } catch(e) {}
    }
    
    function loadParams() {
      try {
        const raw = localStorage.getItem('true_liff_params');
        if (!raw) return null;
        const data = JSON.parse(raw);
        // ใช้ได้ใน 10 นาที
        if (Date.now() - data._ts > 10 * 60 * 1000) {
          localStorage.removeItem('true_liff_params');
          return null;
        }
        return data;
      } catch(e) { return null; }
    }
    
    function clearParams() {
      try { localStorage.removeItem('true_liff_params'); } catch(e) {}
    }

    async function main() {
      const currentParams = new URLSearchParams(window.location.search);

      const liffState = currentParams.get("liff.state");
      let kw = '', mt = '', cp = '', ch = '', ac = '', gclid = '';

      // 1) อ่านจาก liff.state (ถ้ามี)
      if (liffState) {
        try {
          const stateParams = new URLSearchParams(decodeURIComponent(liffState));
          kw = stateParams.get("kw") || '';
          mt = stateParams.get("mt") || '';
          cp = stateParams.get("cp") || '';
          ch = stateParams.get("ch") || '';
          ac = stateParams.get("ac") || '';
          gclid = stateParams.get("gc") || '';
        } catch(e) {}
      }

      // 2) อ่านจาก URL ปัจจุบัน
      if (!kw) kw = currentParams.get("keyword")      || '';
      if (!mt) mt = currentParams.get("matchtype")    || '';
      if (!cp) cp = currentParams.get("utm_campaign") || '';
      if (!ch) ch = currentParams.get("channel")      || '';
      if (!ac) ac = currentParams.get("action")       || '';
      if (!gclid) gclid = currentParams.get("gclid")  || '';

      // 3) ถ้ามีค่ามาจาก URL → save ลง localStorage ทันที (กันหายตอน redirect)
      if (kw || mt || cp || ch || ac || gclid) {
        saveParams({ kw, mt, cp, ch, ac, gclid });
      }

      await liff.init({
        liffId: LIFF_ID,
        withLoginOnExternalBrowser: true
      });

      // 4) ถ้ายังไม่ login → save แล้ว redirect ไป login
      if (!liff.isLoggedIn()) {
        // เก็บลง sessionStorage + localStorage ก่อน
        sessionStorage.setItem('liff_action',    ac);
        sessionStorage.setItem('liff_keyword',   kw);
        sessionStorage.setItem('liff_matchtype', mt);
        sessionStorage.setItem('liff_campaign',  cp);
        sessionStorage.setItem('liff_channel',   ch);
        sessionStorage.setItem('liff_gclid',     gclid);
        saveParams({ kw, mt, cp, ch, ac, gclid });

        const state = encodeURIComponent(
          "kw=" + encodeURIComponent(kw) +
          "&mt=" + encodeURIComponent(mt) +
          "&cp=" + encodeURIComponent(cp) +
          "&ch=" + encodeURIComponent(ch) +
          "&ac=" + encodeURIComponent(ac) +
          "&gc=" + encodeURIComponent(gclid)
        );
        liff.login({ redirectUri: window.location.origin + window.location.pathname + "?liff.state=" + state });
        return;
      }

      // 5) Login แล้ว → ถ้ายังไม่มี channel → ลองดึงจาก localStorage / sessionStorage
      if (!ch || !kw || !ac) {
        const stored = loadParams();
        if (stored) {
          if (!ac) ac = stored.ac || '';
          if (!kw) kw = stored.kw || '';
          if (!mt) mt = stored.mt || '';
          if (!cp) cp = stored.cp || '';
          if (!ch) ch = stored.ch || '';
          if (!gclid) gclid = stored.gclid || '';
        }
        
        if (!ac) ac = sessionStorage.getItem('liff_action')    || '';
        if (!kw) kw = sessionStorage.getItem('liff_keyword')   || '';
        if (!mt) mt = sessionStorage.getItem('liff_matchtype') || '';
        if (!cp) cp = sessionStorage.getItem('liff_campaign')  || '';
        if (!ch) ch = sessionStorage.getItem('liff_channel')   || '';
        if (!gclid) gclid = sessionStorage.getItem('liff_gclid') || '';
      }

      // 6) ล้าง storage หลังใช้งาน
      sessionStorage.removeItem('liff_action');
      sessionStorage.removeItem('liff_keyword');
      sessionStorage.removeItem('liff_matchtype');
      sessionStorage.removeItem('liff_campaign');
      sessionStorage.removeItem('liff_channel');
      sessionStorage.removeItem('liff_gclid');
      clearParams();

      const profile   = await liff.getProfile();
      const device    = /Mobi|Android/i.test(navigator.userAgent) ? "มือถือ" : "คอมพิวเตอร์";
      const timestamp = new Date().toLocaleString("th-TH", { timeZone: "Asia/Bangkok" });

      const data = {
        lineUserId:   profile.userId,
        displayName:  profile.displayName,
        keyword:      kw || "(not provided)",
        matchtype:    mt,
        utm_source:   ch || 'Direct',
        utm_campaign: cp,
        gclid:        gclid,
        device:       device,
        timestamp:    timestamp,
        action:       ac
      };

      const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
      navigator.sendBeacon(WEBHOOK_URL, blob);

      try {
        await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          keepalive: true,
          body: JSON.stringify(data)
        });
      } catch(e) {
        console.error("Webhook error:", e);
      }

      if (liff.isInClient()) {
        liff.openWindow({
          url: "https://line.me/R/ti/p/@clubtrue",
          external: false
        });
      } else {
        window.location.href = "https://line.me/R/ti/p/@clubtrue";
      }
    }

    main().catch(console.error);
  </script>
</body>
</html>
