<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>กำลังเชื่อมต่อ...</title>
  <link rel="preload" href="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js" as="script">
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Helvetica Neue', sans-serif;
      background: #ffffff;
      color: #222222;
      padding: 20px;
    }
    .logo-img {
      width: 80%;
      max-width: 300px;
      margin-bottom: 24px;
      border-radius: 16px;
    }
    .line-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.07);
      border-radius: 50px;
      padding: 10px 20px;
      margin-bottom: 20px;
    }
    .line-icon {
      width: 32px;
      height: 32px;
      background: #06C755;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .line-icon svg { width: 24px; height: 24px; }
    .line-text { font-size: 16px; font-weight: 600; color: #222222; }
    .status-text { font-size: 14px; color: #555555; margin-bottom: 24px; }
    .dots { display: flex; gap: 8px; }
    .dot {
      width: 10px; height: 10px;
      background: #222222; border-radius: 50%;
      opacity: 0.3; animation: pulse 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <img class="logo-img"
       src="https://raw.githubusercontent.com/proservice3000ud/True-liff-bridge/main/Trueonline-logo.svg.png"
       alt="True Online">
  <div class="line-badge">
    <div class="line-icon">
      <svg viewBox="0 0 24 24" fill="white">
        <path d="M12 2C6.48 2 2 6.03 2 11c0 3.13 1.68 5.9 4.28 7.6L5.5 22l3.62-1.9C10.3 20.67 11.15 21 12 21c5.52 0 10-4.03 10-9S17.52 2 12 2z"/>
      </svg>
    </div>
    <span class="line-text">กำลังพาคุณไปยัง LINE @clubtrue</span>
  </div>
  <p class="status-text">กรุณารอสักครู่...</p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <script>
    const LIFF_ID = "2009932145-FwlmUmzy";
    const WEBHOOK_URL = "https://n8nb.workproservice.org/webhook/true-liff";

    async function main() {
      const currentParams = new URLSearchParams(window.location.search);
      const liffState = currentParams.get("liff.state");
      
      let kw = '', mt = '', cp = '', ch = '', ac = '', gclid = '';
      let source = 'unknown';

      // 1) อ่านจาก liff.state ก่อน (กรณี redirect กลับมาจาก LINE login)
      if (liffState) {
        try {
          const stateParams = new URLSearchParams(decodeURIComponent(liffState));
          kw = stateParams.get("kw") || '';
          mt = stateParams.get("mt") || '';
          cp = stateParams.get("cp") || '';
          ch = stateParams.get("ch") || '';
          ac = stateParams.get("ac") || '';
          gclid = stateParams.get("gc") || '';
          source = 'liff.state';
        } catch(e) {}
      }

      // 2) อ่านจาก URL ปัจจุบัน (กรณีเข้ามาตรงๆ ไม่ผ่าน login)
      if (!ch && currentParams.get("channel")) {
        kw = currentParams.get("keyword") || '';
        mt = currentParams.get("matchtype") || '';
        cp = currentParams.get("utm_campaign") || '';
        ch = currentParams.get("channel") || '';
        ac = currentParams.get("action") || '';
        gclid = currentParams.get("gclid") || '';
        source = 'URL params';
      }

      // 3) ถ้ายังไม่ได้ → ลอง sessionStorage (กรณีกลับมาจาก login แต่ไม่มี state)
      if (!ch) {
        const stored_ch = sessionStorage.getItem('liff_channel');
        if (stored_ch) {
          ac = sessionStorage.getItem('liff_action') || '';
          kw = sessionStorage.getItem('liff_keyword') || '';
          mt = sessionStorage.getItem('liff_matchtype') || '';
          cp = sessionStorage.getItem('liff_campaign') || '';
          ch = stored_ch;
          gclid = sessionStorage.getItem('liff_gclid') || '';
          source = 'sessionStorage';
        }
      }

      // 🔍 DEBUG ALERT - ลบออกหลัง debug เสร็จ
      alert(
        '🔍 LIFF Bridge Debug\n\n' +
        '📦 ค่าที่อ่านได้:\n' +
        '- channel: "' + ch + '"\n' +
        '- gclid: "' + (gclid ? gclid.substring(0, 20) + '...' : '') + '"\n' +
        '- keyword: "' + kw + '"\n' +
        '- action: "' + ac + '"\n\n' +
        '🔗 ที่มา: ' + source + '\n\n' +
        '📍 URL: ' + window.location.href.substring(0, 150) + '...\n\n' +
        '🔐 liff.state: ' + (liffState ? 'มี' : 'ไม่มี')
      );

      await liff.init({
        liffId: LIFF_ID,
        withLoginOnExternalBrowser: true
      });

      // 4) ถ้ายังไม่ได้ login → save แล้ว redirect ไป login
      if (!liff.isLoggedIn()) {
        sessionStorage.setItem('liff_action', ac);
        sessionStorage.setItem('liff_keyword', kw);
        sessionStorage.setItem('liff_matchtype', mt);
        sessionStorage.setItem('liff_campaign', cp);
        sessionStorage.setItem('liff_channel', ch);
        sessionStorage.setItem('liff_gclid', gclid);

        const state = encodeURIComponent(
          "kw=" + encodeURIComponent(kw) +
          "&mt=" + encodeURIComponent(mt) +
          "&cp=" + encodeURIComponent(cp) +
          "&ch=" + encodeURIComponent(ch) +
          "&ac=" + encodeURIComponent(ac) +
          "&gc=" + encodeURIComponent(gclid)
        );
        liff.login({ 
          redirectUri: window.location.origin + window.location.pathname + "?liff.state=" + state 
        });
        return;
      }

      // 5) Login แล้ว → clear storage
      sessionStorage.removeItem('liff_action');
      sessionStorage.removeItem('liff_keyword');
      sessionStorage.removeItem('liff_matchtype');
      sessionStorage.removeItem('liff_campaign');
      sessionStorage.removeItem('liff_channel');
      sessionStorage.removeItem('liff_gclid');

      // 6) ส่งข้อมูลไป webhook
      const profile = await liff.getProfile();
      const device = /Mobi|Android/i.test(navigator.userAgent) ? "มือถือ" : "คอมพิวเตอร์";
      const timestamp = new Date().toLocaleString("th-TH", { timeZone: "Asia/Bangkok" });

      const data = {
        lineUserId: profile.userId,
        displayName: profile.displayName,
        keyword: kw || "(not provided)",
        matchtype: mt,
        utm_source: ch || 'Direct',
        utm_campaign: cp,
        gclid: gclid,
        device: device,
        timestamp: timestamp,
        action: ac
      };

      const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
      navigator.sendBeacon(WEBHOOK_URL, blob);

      try {
        await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          keepalive: true,
          body: JSON.stringify(data)
        });
      } catch(e) {
        console.error("Webhook error:", e);
      }

      // 7) Redirect ไป LINE OA
      if (liff.isInClient()) {
        liff.openWindow({
          url: "https://line.me/R/ti/p/@clubtrue",
          external: false
        });
      } else {
        window.location.href = "https://line.me/R/ti/p/@clubtrue";
      }
    }

    main().catch(function(err) {
      console.error(err);
      alert('❌ Error: ' + err.message);
    });
  </script>
</body>
</html>
